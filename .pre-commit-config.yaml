repos:
  - repo: local
    hooks:
      - id: check-changelog
        name: Changelog Check
        description: "Verify that changelog.log exists"
        entry: make check-changelog
        language: system
        pass_filenames: false

      - id: swiftlint
        name: SwiftLint
        description: "Check Swift style and conventions"
        entry: make lint
        language: system
        files: \.swift$
      
      - id: swift-test
        name: Swift Test
        description: "Run the Swift test suite"
        entry: make test
        language: system
        pass_filenames: false